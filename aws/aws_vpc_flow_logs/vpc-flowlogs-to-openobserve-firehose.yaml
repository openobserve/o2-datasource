AWSTemplateFormatVersion: '2010-09-09'
Description: 'VPC Flow Logs to OpenObserve via Firehose (Direct - Recommended)'

Parameters:
  OpenObserveEndpoint:
    Type: String
    Description: 'OpenObserve HTTP endpoint URL (e.g., https://api.openobserve.ai/api/your-org/default/_kinesis)'

  OpenObserveAccessKey:
    Type: String
    NoEcho: true
    Description: 'OpenObserve access key for authentication (base64 encoded user:password)'

  StreamName:
    Type: String
    Default: 'vpc-flow-logs-stream'
    Description: 'Name for the OpenObserve stream'

  VpcId:
    Type: String
    Description: 'VPC ID to capture flow logs from (e.g., vpc-xxxxx)'

  TrafficType:
    Type: String
    Default: 'ALL'
    AllowedValues:
      - ALL
      - ACCEPT
      - REJECT
    Description: 'Type of traffic to log (ALL, ACCEPT, or REJECT)'

  BackupS3BucketName:
    Type: String
    Description: 'S3 bucket name for failed records backup (must be globally unique)'

Resources:
  # S3 Bucket for Failed Records
  BackupS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BackupS3BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldBackups
            Status: Enabled
            ExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # IAM Role for Kinesis Firehose
  FirehoseDeliveryRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: FirehoseDeliveryPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:AbortMultipartUpload'
                  - 's3:GetBucketLocation'
                  - 's3:GetObject'
                  - 's3:ListBucket'
                  - 's3:ListBucketMultipartUploads'
                  - 's3:PutObject'
                Resource:
                  - !GetAtt BackupS3Bucket.Arn
                  - !Sub '${BackupS3Bucket.Arn}/*'
              - Effect: Allow
                Action:
                  - 'lambda:InvokeFunction'
                  - 'lambda:GetFunctionConfiguration'
                Resource: !GetAtt FlowLogTransformFunction.Arn

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'

  # Lambda Function for Flow Log Transformation and Protocol Enrichment
  FlowLogTransformFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-flowlog-transformer'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 256
      Code:
        ZipFile: |
          import base64
          import json
          from datetime import datetime

          # Protocol number to name mapping (common protocols)
          PROTOCOL_MAP = {
              1: 'ICMP',
              6: 'TCP',
              17: 'UDP',
              47: 'GRE',
              50: 'ESP',
              51: 'AH',
              58: 'ICMPv6',
              89: 'OSPF',
              132: 'SCTP'
          }

          def lambda_handler(event, context):
              output = []

              for record in event['records']:
                  try:
                      # Decode the data
                      payload = base64.b64decode(record['data']).decode('utf-8').strip()

                      # VPC Flow Logs sent to Firehose are JSON-wrapped
                      # Format: {"message": "2 058694856476 eni-xxx ..."}
                      try:
                          json_data = json.loads(payload)
                          flow_log_line = json_data.get('message', payload)
                      except json.JSONDecodeError:
                          # If not JSON, assume it's raw flow log format
                          flow_log_line = payload

                      # Skip header lines
                      if flow_log_line.startswith('version') or flow_log_line.startswith('account-id'):
                          output_record = {
                              'recordId': record['recordId'],
                              'result': 'Dropped',
                              'data': record['data']
                          }
                          output.append(output_record)
                          continue

                      # Parse VPC Flow Log format
                      # Default format: version account-id interface-id srcaddr dstaddr srcport dstport protocol packets bytes start end action log-status
                      fields = flow_log_line.split()

                      if len(fields) >= 14:
                          protocol_num = int(fields[7])

                          # Create structured log entry with protocol enrichment
                          transformed = {
                              'timestamp': int(fields[10]) * 1000,  # start time in milliseconds
                              'version': int(fields[0]),
                              'account_id': fields[1],
                              'interface_id': fields[2],
                              'srcaddr': fields[3],
                              'dstaddr': fields[4],
                              'srcport': int(fields[5]) if fields[5] != '-' else 0,
                              'dstport': int(fields[6]) if fields[6] != '-' else 0,
                              'protocol': protocol_num,
                              'protocol_name': PROTOCOL_MAP.get(protocol_num, f'UNKNOWN-{protocol_num}'),
                              'packets': int(fields[8]),
                              'bytes': int(fields[9]),
                              'start': int(fields[10]),
                              'end': int(fields[11]),
                              'action': fields[12],
                              'log_status': fields[13],
                              'vpc_flow_log': True
                          }

                          # Convert to JSON
                          output_data = json.dumps(transformed) + '\n'
                          output_record = {
                              'recordId': record['recordId'],
                              'result': 'Ok',
                              'data': base64.b64encode(output_data.encode('utf-8')).decode('utf-8')
                          }
                      else:
                          # Invalid format, drop the record
                          print(f"Invalid flow log format: {flow_log_line}")
                          output_record = {
                              'recordId': record['recordId'],
                              'result': 'ProcessingFailed',
                              'data': record['data']
                          }

                  except Exception as e:
                      print(f"Error processing record: {str(e)}")
                      output_record = {
                          'recordId': record['recordId'],
                          'result': 'ProcessingFailed',
                          'data': record['data']
                      }

                  output.append(output_record)

              return {'records': output}

  # Kinesis Data Firehose to OpenObserve
  OpenObserveFirehose:
    Type: AWS::KinesisFirehose::DeliveryStream
    DependsOn:
      - FirehoseDeliveryRole
      - BackupS3Bucket
    Properties:
      DeliveryStreamName: !Sub '${AWS::StackName}-to-openobserve'
      DeliveryStreamType: DirectPut
      HttpEndpointDestinationConfiguration:
        EndpointConfiguration:
          Url: !Ref OpenObserveEndpoint
          AccessKey: !Ref OpenObserveAccessKey
          Name: OpenObserve
        RequestConfiguration:
          ContentEncoding: GZIP
          CommonAttributes:
            - AttributeName: stream-name
              AttributeValue: !Ref StreamName
        BufferingHints:
          SizeInMBs: 1
          IntervalInSeconds: 60
        RetryOptions:
          DurationInSeconds: 300
        S3BackupMode: FailedDataOnly
        S3Configuration:
          BucketARN: !GetAtt BackupS3Bucket.Arn
          RoleARN: !GetAtt FirehoseDeliveryRole.Arn
          CompressionFormat: GZIP
          BufferingHints:
            SizeInMBs: 5
            IntervalInSeconds: 300
          Prefix: 'failed-flowlogs/'
          ErrorOutputPrefix: 'error-flowlogs/'
        ProcessingConfiguration:
          Enabled: true
          Processors:
            - Type: Lambda
              Parameters:
                - ParameterName: LambdaArn
                  ParameterValue: !GetAtt FlowLogTransformFunction.Arn
                - ParameterName: RoleArn
                  ParameterValue: !GetAtt FirehoseDeliveryRole.Arn
        RoleARN: !GetAtt FirehoseDeliveryRole.Arn

  # VPC Flow Log
  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    DependsOn:
      - OpenObserveFirehose
    Properties:
      ResourceType: VPC
      ResourceId: !Ref VpcId
      TrafficType: !Ref TrafficType
      LogDestinationType: kinesis-data-firehose
      LogDestination: !GetAtt OpenObserveFirehose.Arn
      LogFormat: '${version} ${account-id} ${interface-id} ${srcaddr} ${dstaddr} ${srcport} ${dstport} ${protocol} ${packets} ${bytes} ${start} ${end} ${action} ${log-status}'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-flowlog'

Outputs:
  VpcId:
    Description: 'VPC ID being monitored'
    Value: !Ref VpcId

  FlowLogId:
    Description: 'VPC Flow Log ID'
    Value: !Ref VPCFlowLog

  FirehoseDeliveryStreamName:
    Description: 'Firehose Delivery Stream Name'
    Value: !Ref OpenObserveFirehose

  FirehoseDeliveryStreamArn:
    Description: 'Firehose Delivery Stream ARN'
    Value: !GetAtt OpenObserveFirehose.Arn

  BackupS3BucketName:
    Description: 'S3 Bucket for Failed Records'
    Value: !Ref BackupS3Bucket

  TrafficType:
    Description: 'Traffic type being logged'
    Value: !Ref TrafficType

  NextSteps:
    Description: 'Next Steps'
    Value: 'VPC Flow Logs are now streaming directly to OpenObserve via Firehose with protocol enrichment'
